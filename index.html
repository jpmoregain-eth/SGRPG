<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGRPG - Loot Database Editor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a2e;
            color: #eee;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: #e94560;
            margin-bottom: 10px;
        }
        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 30px;
        }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #333;
            padding-bottom: 10px;
        }
        .tab {
            padding: 10px 20px;
            background: #16213e;
            border: none;
            color: #eee;
            cursor: pointer;
            border-radius: 5px 5px 0 0;
            transition: all 0.3s;
        }
        .tab:hover { background: #0f3460; }
        .tab.active {
            background: #e94560;
            color: white;
        }
        .panel { display: none; }
        .panel.active { display: block; }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background: #16213e;
            border-radius: 8px;
            overflow: hidden;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #333;
        }
        th {
            background: #0f3460;
            color: #e94560;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.85em;
        }
        tr:hover { background: #1a1a3e; }
        input, select, textarea {
            background: #0f3460;
            border: 1px solid #333;
            color: #eee;
            padding: 8px;
            border-radius: 4px;
            width: 100%;
            font-family: inherit;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #e94560;
        }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s;
        }
        .btn-primary {
            background: #e94560;
            color: white;
        }
        .btn-primary:hover { background: #c13651; }
        .btn-success {
            background: #4CAF50;
            color: white;
        }
        .btn-success:hover { background: #45a049; }
        .btn-danger {
            background: #f44336;
            color: white;
        }
        .btn-danger:hover { background: #da190b; }
        .actions {
            display: flex;
            gap: 10px;
            margin: 20px 0;
        }
        .rarity-E { color: #9E9E9E; }
        .rarity-D { color: #4CAF50; }
        .rarity-C { color: #2196F3; }
        .rarity-B { color: #9C27B0; }
        .rarity-A { color: #FF9800; }
        .rarity-S { color: #F44336; font-weight: bold; }
        .color-preview {
            display: inline-block;
            width: 20px;
            height: 20px;
            border-radius: 3px;
            vertical-align: middle;
            margin-right: 8px;
            border: 1px solid #666;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: #16213e;
            padding: 30px;
            border-radius: 10px;
            width: 90%;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .modal-header h2 { color: #e94560; }
        .close-btn {
            background: none;
            border: none;
            color: #888;
            font-size: 1.5em;
            cursor: pointer;
        }
        .close-btn:hover { color: #e94560; }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #aaa;
            font-size: 0.9em;
        }
        .json-output {
            background: #0f3460;
            padding: 15px;
            border-radius: 5px;
            font-family: 'Courier New', monospace;
            font-size: 0.85em;
            overflow-x: auto;
            white-space: pre-wrap;
            word-break: break-all;
            max-height: 300px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <h1>⚔️ SGRPG Loot Database</h1>
    <p class="subtitle">Edit your RPG loot system - all changes saved to browser memory</p>
    
    <div class="tabs">
        <button class="tab active" onclick="showPanel('rarities')">Rarities</button>
        <button class="tab" onclick="showPanel('slots')">Slots</button>
        <button class="tab" onclick="showPanel('item_types')">Item Types</button>
        <button class="tab" onclick="showPanel('consumable_types')">Consumables</button>
        <button class="tab" onclick="showPanel('export')">Export JSON</button>
    </div>

    <!-- Rarities Panel -->
    <div id="rarities" class="panel active">
        <div class="actions">
            <button class="btn btn-primary" onclick="openModal('rarity')">+ Add Rarity</button>
        </div>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Color</th>
                    <th>Drop Weight</th>
                    <th>Salvage Multiplier</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="rarities-table"></tbody>
        </table>
    </div>

    <!-- Slots Panel -->
    <div id="slots" class="panel">
        <div class="actions">
            <button class="btn btn-primary" onclick="openModal('slot')">+ Add Slot</button>
        </div>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Category</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="slots-table"></tbody>
        </table>
    </div>

    <!-- Item Types Panel -->
    <div id="item_types" class="panel">
        <div class="actions">
            <button class="btn btn-primary" onclick="openModal('item_type')">+ Add Item Type</button>
        </div>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Slot</th>
                    <th>Description</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="item-types-table"></tbody>
        </table>
    </div>

    <!-- Consumable Types Panel -->
    <div id="consumable_types" class="panel">
        <div class="actions">
            <button class="btn btn-primary" onclick="openModal('consumable_type')">+ Add Consumable Type</button>
        </div>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Category</th>
                    <th>Description</th>
                    <th>Stack Size</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="consumable-types-table"></tbody>
        </table>
    </div>

    <!-- Export Panel -->
    <div id="export" class="panel">
        <div class="actions">
            <button class="btn btn-success" onclick="exportJSON()">📋 Copy to Clipboard</button>
            <button class="btn btn-primary" onclick="downloadJSON()">💾 Download loot_database.json</button>
        </div>
        <div class="json-output" id="json-output"></div>
    </div>

    <!-- Modal -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">Add New</h2>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            <div id="modal-body"></div>
            <div class="actions">
                <button class="btn btn-success" onclick="saveItem()">Save</button>
                <button class="btn btn-danger" onclick="closeModal()">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        // Initial data
        let db = {
            "rarities": {
                "E": {"name": "Common", "color": "#9E9E9E", "drop_weight": 1000, "salvage_multiplier": 1.0},
                "D": {"name": "Uncommon", "color": "#4CAF50", "drop_weight": 500, "salvage_multiplier": 1.5},
                "C": {"name": "Rare", "color": "#2196F3", "drop_weight": 200, "salvage_multiplier": 2.5},
                "B": {"name": "Epic", "color": "#9C27B0", "drop_weight": 50, "salvage_multiplier": 4.0},
                "A": {"name": "Legendary", "color": "#FF9800", "drop_weight": 10, "salvage_multiplier": 7.0},
                "S": {"name": "Mythic", "color": "#F44336", "drop_weight": 2, "salvage_multiplier": 12.0}
            },
            "slots": {
                "main_hand": {"name": "Main Hand", "category": "weapon"},
                "off_hand": {"name": "Off Hand", "category": "weapon"},
                "head": {"name": "Head", "category": "armor"},
                "body": {"name": "Body", "category": "armor"},
                "gloves": {"name": "Gloves", "category": "armor"},
                "boots": {"name": "Boots", "category": "armor"},
                "necklace": {"name": "Necklace", "category": "accessory"},
                "ring_1": {"name": "Ring 1", "category": "accessory"},
                "ring_2": {"name": "Ring 2", "category": "accessory"}
            },
            "item_types": {
                "sword": {"name": "Sword", "slot": "main_hand", "description": "A balanced blade for close combat"},
                "dagger": {"name": "Dagger", "slot": "main_hand", "description": "Fast and deadly in the right hands"},
                "axe": {"name": "Axe", "slot": "main_hand", "description": "Heavy strikes that cleave through armor"},
                "staff": {"name": "Staff", "slot": "main_hand", "description": "Channel magical energies"},
                "wand": {"name": "Wand", "slot": "main_hand", "description": "Focus arcane power"},
                "bow": {"name": "Bow", "slot": "main_hand", "description": "Ranged precision"},
                "shield": {"name": "Shield", "slot": "off_hand", "description": "Block incoming attacks"},
                "orb": {"name": "Orb", "slot": "off_hand", "description": "Amplify magical abilities"},
                "tome": {"name": "Tome", "slot": "off_hand", "description": "Ancient knowledge at your fingertips"},
                "helm": {"name": "Helm", "slot": "head", "description": "Protect your head"},
                "chestplate": {"name": "Chestplate", "slot": "body", "description": "Heavy torso protection"},
                "robe": {"name": "Robe", "slot": "body", "description": "Light armor for spellcasters"},
                "gauntlets": {"name": "Gauntlets", "slot": "gloves", "description": "Reinforced hand protection"},
                "greaves": {"name": "Greaves", "slot": "boots", "description": "Sturdy leg and foot armor"},
                "amulet": {"name": "Amulet", "slot": "necklace", "description": "Magical pendant"},
                "ring": {"name": "Ring", "slot": "ring_1", "description": "Enchanted band"}
            },
            "consumable_types": {
                "health_potion": {"name": "Health Potion", "category": "potion", "description": "Restores health instantly", "stack_size": 99},
                "mana_potion": {"name": "Mana Potion", "category": "potion", "description": "Restores mana instantly", "stack_size": 99},
                "stamina_potion": {"name": "Stamina Potion", "category": "potion", "description": "Restores stamina instantly", "stack_size": 99},
                "elixir": {"name": "Elixir", "category": "potion", "description": "Grants temporary buffs", "stack_size": 20},
                "skill_stone": {"name": "Skill Stone", "category": "skill_stone", "description": "Teaches a new skill", "stack_size": 1},
                "gold": {"name": "Gold", "category": "currency", "description": "Standard currency", "stack_size": 999999},
                "premium_token": {"name": "Premium Token", "category": "currency", "description": "Premium shop currency", "stack_size": 999},
                "honor_point": {"name": "Honor Point", "category": "currency", "description": "PvP currency", "stack_size": 9999},
                "iron_ore": {"name": "Iron Ore", "category": "material", "description": "Basic crafting material", "stack_size": 999},
                "leather": {"name": "Leather", "category": "material", "description": "Armor crafting material", "stack_size": 999},
                "magic_essence": {"name": "Magic Essence", "category": "material", "description": "Enchanting material", "stack_size": 999},
                "ancient_rune": {"name": "Ancient Rune", "category": "material", "description": "Rare crafting component", "stack_size": 99}
            }
        };

        let currentEdit = null;
        let currentType = null;

        function showPanel(panelId) {
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(panelId).classList.add('active');
            event.target.classList.add('active');
            
            if (panelId === 'export') updateExport();
            else renderTable(panelId);
        }

        function renderTable(type) {
            if (type === 'rarities') {
                const tbody = document.getElementById('rarities-table');
                tbody.innerHTML = Object.entries(db.rarities).map(([id, r]) => `
                    <tr>
                        <td class="rarity-${id}">${id}</td>
                        <td>${r.name}</td>
                        <td><span class="color-preview" style="background: ${r.color}"></span>${r.color}</td>
                        <td>${r.drop_weight}</td>
                        <td>${r.salvage_multiplier}x</td>
                        <td>
                            <button class="btn btn-primary" onclick="editItem('rarity', '${id}')">Edit</button>
                            <button class="btn btn-danger" onclick="deleteItem('rarity', '${id}')">Delete</button>
                        </td>
                    </tr>
                `).join('');
            } else if (type === 'slots') {
                const tbody = document.getElementById('slots-table');
                tbody.innerHTML = Object.entries(db.slots).map(([id, s]) => `
                    <tr>
                        <td>${id}</td>
                        <td>${s.name}</td>
                        <td>${s.category}</td>
                        <td>
                            <button class="btn btn-primary" onclick="editItem('slot', '${id}')">Edit</button>
                            <button class="btn btn-danger" onclick="deleteItem('slot', '${id}')">Delete</button>
                        </td>
                    </tr>
                `).join('');
            } else if (type === 'item_types') {
                const tbody = document.getElementById('item-types-table');
                tbody.innerHTML = Object.entries(db.item_types).map(([id, t]) => `
                    <tr>
                        <td>${id}</td>
                        <td>${t.name}</td>
                        <td>${t.slot}</td>
                        <td>${t.description}</td>
                        <td>
                            <button class="btn btn-primary" onclick="editItem('item_type', '${id}')">Edit</button>
                            <button class="btn btn-danger" onclick="deleteItem('item_type', '${id}')">Delete</button>
                        </td>
                    </tr>
                `).join('');
            } else if (type === 'consumable_types') {
                const tbody = document.getElementById('consumable-types-table');
                tbody.innerHTML = Object.entries(db.consumable_types).map(([id, c]) => `
                    <tr>
                        <td>${id}</td>
                        <td>${c.name}</td>
                        <td>${c.category}</td>
                        <td>${c.description}</td>
                        <td>${c.stack_size}</td>
                        <td>
                            <button class="btn btn-primary" onclick="editItem('consumable_type', '${id}')">Edit</button>
                            <button class="btn btn-danger" onclick="deleteItem('consumable_type', '${id}')">Delete</button>
                        </td>
                    </tr>
                `).join('');
            }
        }

        function openModal(type, id = null) {
            currentType = type;
            currentEdit = id;
            const modal = document.getElementById('modal');
            const title = document.getElementById('modal-title');
            const body = document.getElementById('modal-body');
            
            title.textContent = id ? `Edit ${type.replace('_', ' ')}` : `Add ${type.replace('_', ' ')}`;
            
            let fields = '';
            if (type === 'rarity') {
                const r = id ? db.rarities[id] : {};
                fields = `
                    <div class="form-group"><label>ID (single letter)</label><input type="text" id="field-id" value="${id || ''}" maxlength="1" ${id ? 'readonly' : ''}></div>
                    <div class="form-group"><label>Name</label><input type="text" id="field-name" value="${r.name || ''}"></div>
                    <div class="form-group"><label>Color (hex)</label><input type="color" id="field-color" value="${r.color || '#9E9E9E'}"></div>
                    <div class="form-group"><label>Drop Weight</label><input type="number" id="field-drop_weight" value="${r.drop_weight || 100}"></div>
                    <div class="form-group"><label>Salvage Multiplier</label><input type="number" step="0.1" id="field-salvage_multiplier" value="${r.salvage_multiplier || 1.0}"></div>
                `;
            } else if (type === 'slot') {
                const s = id ? db.slots[id] : {};
                fields = `
                    <div class="form-group"><label>ID (snake_case)</label><input type="text" id="field-id" value="${id || ''}" ${id ? 'readonly' : ''}></div>
                    <div class="form-group"><label>Name</label><input type="text" id="field-name" value="${s.name || ''}"></div>
                    <div class="form-group"><label>Category</label>
                        <select id="field-category">
                            <option value="weapon" ${s.category === 'weapon' ? 'selected' : ''}>Weapon</option>
                            <option value="armor" ${s.category === 'armor' ? 'selected' : ''}>Armor</option>
                            <option value="accessory" ${s.category === 'accessory' ? 'selected' : ''}>Accessory</option>
                        </select>
                    </div>
                `;
            } else if (type === 'item_type') {
                const t = id ? db.item_types[id] : {};
                const slotOptions = Object.entries(db.slots).map(([sid, s]) => 
                    `<option value="${sid}" ${t.slot === sid ? 'selected' : ''}>${s.name}</option>`
                ).join('');
                fields = `
                    <div class="form-group"><label>ID (snake_case)</label><input type="text" id="field-id" value="${id || ''}" ${id ? 'readonly' : ''}></div>
                    <div class="form-group"><label>Name</label><input type="text" id="field-name" value="${t.name || ''}"></div>
                    <div class="form-group"><label>Slot</label><select id="field-slot">${slotOptions}</select></div>
                    <div class="form-group"><label>Description</label><textarea id="field-description" rows="3">${t.description || ''}</textarea></div>
                `;
            } else if (type === 'consumable_type') {
                const c = id ? db.consumable_types[id] : {};
                fields = `
                    <div class="form-group"><label>ID (snake_case)</label><input type="text" id="field-id" value="${id || ''}" ${id ? 'readonly' : ''}></div>
                    <div class="form-group"><label>Name</label><input type="text" id="field-name" value="${c.name || ''}"></div>
                    <div class="form-group"><label>Category</label>
                        <select id="field-category">
                            <option value="potion" ${c.category === 'potion' ? 'selected' : ''}>Potion</option>
                            <option value="skill_stone" ${c.category === 'skill_stone' ? 'selected' : ''}>Skill Stone</option>
                            <option value="currency" ${c.category === 'currency' ? 'selected' : ''}>Currency</option>
                            <option value="material" ${c.category === 'material' ? 'selected' : ''}>Material</option>
                        </select>
                    </div>
                    <div class="form-group"><label>Description</label><textarea id="field-description" rows="3">${c.description || ''}</textarea></div>
                    <div class="form-group"><label>Stack Size</label><input type="number" id="field-stack_size" value="${c.stack_size || 99}"></div>
                `;
            }
            
            body.innerHTML = fields;
            modal.classList.add('active');
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
            currentEdit = null;
            currentType = null;
        }

        function saveItem() {
            const id = document.getElementById('field-id').value;
            if (!id) { alert('ID is required'); return; }
            
            if (currentType === 'rarity') {
                db.rarities[id] = {
                    name: document.getElementById('field-name').value,
                    color: document.getElementById('field-color').value,
                    drop_weight: parseInt(document.getElementById('field-drop_weight').value),
                    salvage_multiplier: parseFloat(document.getElementById('field-salvage_multiplier').value)
                };
            } else if (currentType === 'slot') {
                db.slots[id] = {
                    name: document.getElementById('field-name').value,
                    category: document.getElementById('field-category').value
                };
            } else if (currentType === 'item_type') {
                db.item_types[id] = {
                    name: document.getElementById('field-name').value,
                    slot: document.getElementById('field-slot').value,
                    description: document.getElementById('field-description').value
                };
            } else if (currentType === 'consumable_type') {
                db.consumable_types[id] = {
                    name: document.getElementById('field-name').value,
                    category: document.getElementById('field-category').value,
                    description: document.getElementById('field-description').value,
                    stack_size: parseInt(document.getElementById('field-stack_size').value)
                };
            }
            
            closeModal();
            renderTable(currentType + 's');
        }

        function editItem(type, id) {
            openModal(type, id);
        }

        function deleteItem(type, id) {
            if (!confirm(`Delete ${id}?`)) return;
            
            if (type === 'rarity') delete db.rarities[id];
            else if (type === 'slot') delete db.slots[id];
            else if (type === 'item_type') delete db.item_types[id];
            else if (type === 'consumable_type') delete db.consumable_types[id];
            
            renderTable(type + 's');
        }

        function updateExport() {
            document.getElementById('json-output').textContent = JSON.stringify(db, null, 2);
        }

        function exportJSON() {
            const json = JSON.stringify(db, null, 2);
            navigator.clipboard.writeText(json).then(() => alert('Copied to clipboard!'));
        }

        function downloadJSON() {
            const json = JSON.stringify(db, null, 2);
            const blob = new Blob([json], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'loot_database.json';
            a.click();
            URL.revokeObjectURL(url);
        }

        // Initial render
        renderTable('rarities');
    </script>
</body>
</html>
