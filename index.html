<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGRPG - Singapore RPG</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Rajdhani', sans-serif;
            background: #000;
            color: #00d4ff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        
        /* Animated background grid */
        .bg-grid {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(0, 212, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 212, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: 0;
        }
        
        /* Scanline effect */
        .scanlines {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.1),
                rgba(0, 0, 0, 0.1) 1px,
                transparent 1px,
                transparent 2px
            );
            z-index: 1;
            pointer-events: none;
        }
        
        /* Main container */
        .game-container {
            position: relative;
            z-index: 2;
            width: 90%;
            max-width: 900px;
            min-height: 600px;
        }
        
        /* Outer frame with neon glow */
        .outer-frame {
            position: relative;
            padding: 20px;
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.05) 0%, rgba(0, 0, 0, 0.8) 100%);
            border: 1px solid rgba(0, 212, 255, 0.3);
            box-shadow: 
                0 0 20px rgba(0, 212, 255, 0.2),
                inset 0 0 20px rgba(0, 212, 255, 0.05);
        }
        
        /* Corner decorations */
        .corner {
            position: absolute;
            width: 40px;
            height: 40px;
            border: 2px solid #00d4ff;
        }
        .corner-tl { top: -1px; left: -1px; border-right: none; border-bottom: none; }
        .corner-tr { top: -1px; right: -1px; border-left: none; border-bottom: none; }
        .corner-bl { bottom: -1px; left: -1px; border-right: none; border-top: none; }
        .corner-br { bottom: -1px; right: -1px; border-left: none; border-top: none; }
        
        /* Inner frame */
        .inner-frame {
            border: 1px solid rgba(0, 212, 255, 0.5);
            padding: 30px;
            background: rgba(0, 10, 20, 0.9);
            position: relative;
        }
        
        /* Header section */
        .header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(0, 212, 255, 0.3);
        }
        
        .warning-icon {
            width: 50px;
            height: 50px;
            border: 2px solid #00d4ff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: #00d4ff;
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 5px rgba(0, 212, 255, 0.5); }
            50% { box-shadow: 0 0 20px rgba(0, 212, 255, 0.8); }
        }
        
        .title-box {
            flex: 1;
            border: 1px solid rgba(0, 212, 255, 0.5);
            padding: 10px 20px;
            background: rgba(0, 212, 255, 0.05);
        }
        
        .title-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #00d4ff;
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
        }
        
        /* Content area */
        .content {
            min-height: 300px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 30px;
        }
        
        .game-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 48px;
            font-weight: 900;
            color: #00d4ff;
            text-shadow: 
                0 0 10px rgba(0, 212, 255, 0.5),
                0 0 20px rgba(0, 212, 255, 0.3),
                0 0 40px rgba(0, 212, 255, 0.1);
            letter-spacing: 8px;
            text-align: center;
        }
        
        .game-subtitle {
            font-size: 18px;
            color: rgba(0, 212, 255, 0.7);
            letter-spacing: 6px;
            text-transform: uppercase;
        }
        
        .flavor-text {
            font-size: 16px;
            color: rgba(0, 212, 255, 0.5);
            max-width: 500px;
            text-align: center;
            line-height: 1.6;
            font-style: italic;
        }
        
        /* Start button */
        .start-btn {
            font-family: 'Orbitron', sans-serif;
            font-size: 20px;
            padding: 20px 60px;
            background: transparent;
            border: 2px solid #00d4ff;
            color: #00d4ff;
            cursor: pointer;
            letter-spacing: 4px;
            text-transform: uppercase;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        
        .start-btn:hover {
            background: rgba(0, 212, 255, 0.1);
            box-shadow: 
                0 0 20px rgba(0, 212, 255, 0.4),
                inset 0 0 20px rgba(0, 212, 255, 0.1);
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.8);
        }
        
        .start-btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 212, 255, 0.2), transparent);
            transition: left 0.5s;
        }
        
        .start-btn:hover::before {
            left: 100%;
        }
        
        /* Decorative elements */
        .tech-line {
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, transparent, #00d4ff, transparent);
            margin: 20px 0;
        }
        
        .status-bar {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: rgba(0, 212, 255, 0.4);
            letter-spacing: 2px;
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid rgba(0, 212, 255, 0.2);
        }
        
        /* Blinking cursor */
        .cursor {
            display: inline-block;
            width: 10px;
            height: 20px;
            background: #00d4ff;
            animation: blink 1s infinite;
            vertical-align: middle;
            margin-left: 5px;
        }
        
        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }
        
        /* Version tag */
        .version {
            position: absolute;
            bottom: 10px;
            right: 15px;
            font-size: 10px;
            color: rgba(0, 212, 255, 0.3);
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    <div class="scanlines"></div>
    
    <div class="game-container">
        <div class="outer-frame">
            <div class="corner corner-tl"></div>
            <div class="corner corner-tr"></div>
            <div class="corner corner-bl"></div>
            <div class="corner corner-br"></div>
            
            <div class="inner-frame">
                <div class="header">
                    <div class="warning-icon">!</div>
                    <div class="title-box">
                        <div class="title-text">NOTIFICATION</div>
                    </div>
                </div>
                
                <div class="content">
                    <div>
                        <div class="game-title">SGRPG</div>
                    </div>
                    
                    <div class="tech-line"></div>
                    
                    <div class="flavor-text">
                        The Merlion's Tear has been stolen. Singapore's fate hangs in the balance. 
                        Will you answer the call?
                    </div>
                    
                    <button class="start-btn" onclick="startGame()">
                        INITIALIZE<span class="cursor"></span>
                    </button>
                </div>
                
                <div class="status-bar">
                    <span>SYSTEM: ONLINE</span>
                    <span>LOCATION: CHANGI VILLAGE</span>
                    <span>STATUS: UNKNOWN</span>
                </div>
                
                <div class="version">v0.1.0 DEMO</div>
            </div>
        </div>
    </div>
    
    <script>
        function startGame() {
            // Transition to game screen
            document.querySelector('.content').innerHTML = `
                <div style="text-align: center; padding: 50px;">
                    <div style="font-family: 'Orbitron', sans-serif; font-size: 24px; color: #00d4ff; margin-bottom: 30px;">
                        LOADING...
                    </div>
                    <div style="width: 300px; height: 4px; background: rgba(0, 212, 255, 0.2); margin: 0 auto; border-radius: 2px; overflow: hidden;">
                        <div style="width: 0%; height: 100%; background: #00d4ff; animation: load 2s forwards;"></div>
                    </div>
                </div>
                <style>
                    @keyframes load {
                        0% { width: 0%; }
                        100% { width: 100%; }
                    }
                </style>
            `;
            
            setTimeout(() => {
                // Here you would transition to the actual game
                // For now, show a placeholder
                document.querySelector('.content').innerHTML = `
                    <div style="text-align: center; padding: 40px;">
                        <div style="font-family: 'Orbitron', sans-serif; font-size: 20px; color: #00d4ff; margin-bottom: 20px;">
                            GAME STARTS HERE
                        </div>
                        <div style="color: rgba(0, 212, 255, 0.5); font-size: 14px;">
                            (Next: Build the actual game screen with story text and choices)
                        </div>
                    </div>
                `;
            }, 2500);
        }
    </script>
</body>
</html>
